<!doctype html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Licență 2026{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">Licență 2026</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('main.index') }}">Acasă</a>
                <a class="nav-link" href="{{ url_for('main.evaluate') }}">Evaluare</a>
                <a class="nav-link" href="{{ url_for('main.explore') }}">Explore</a>
                <a class="nav-link" href="{{ url_for('main.history') }}">Istoric</a>
                <a class="nav-link" href="{{ url_for('main.listings') }}">Anunțuri</a>
            </div>
        </div>
    </nav>

    <div class="container pt-3">
        {% if flashed_messages %}
            {% for category, message in flashed_messages %}
                <div class="alert alert-{{ 'warning' if category == 'warning' else 'success' }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
