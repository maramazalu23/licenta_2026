<!doctype html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Licență 2026{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">Licență 2026</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('main.index') }}">Acasă</a>
                <a class="nav-link" href="{{ url_for('main.evaluate') }}">Evaluare</a>
                <a class="nav-link" href="{{ url_for('main.explore') }}">Explore</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
